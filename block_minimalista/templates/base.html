<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block titulo %}Bloc de Notas{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg, #f6f8fc, #eef2f7);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            color: #1e1e1e;
        }

        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
        }

        .navbar-brand {
            font-weight: 700;
            color: #2b2b2b !important;
        }

        .nav-link {
            color: #666 !important;
        }

        .nav-link:hover {
            color: #111 !important;
        }

        .container {
            max-width: 900px;
        }

        .card {
            border: none;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
            transition: 0.25s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        input, textarea {
            border-radius: 12px !important;
            border: 1px solid #e6e6e6 !important;
            padding: 12px !important;
        }

        input:focus, textarea:focus {
            border-color: #7aa7ff !important;
            box-shadow: 0 0 0 3px rgba(122,167,255,0.2) !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c8cff, #4f6cff);
            border: none;
            border-radius: 12px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-success,
        .btn-danger,
        .btn-warning {
            border-radius: 12px;
        }

        .nota-titulo {
            font-size: 18px;
            font-weight: 700;
        }

        .nota-texto {
            color: #555;
            white-space: pre-wrap;
            margin-top: 6px;
        }

        .alert {
            border-radius: 12px;
            background: #fff;
            border: 1px solid #eee;
        }

    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand" href="/">
                🗒 Bloc de Notas
            </a>

            <div class="ms-auto">

                <a class="nav-link d-inline" href="/tareas">Notas</a>
                <a class="nav-link d-inline ms-3" href="/salir">Salir</a>

            </div>

        </div>

    </nav>

    <main class="container mt-4">

        {% with mensajes = get_flashed_messages() %}
            {% if mensajes %}
                {% for mensaje in mensajes %}
                    <div class="alert">
                        {{ mensaje }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block contenido %}{% endblock %}

    </main>

</body>
</html>
